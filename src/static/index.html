<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicGuard - Перевірка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: rgba(20, 24, 33, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #0088cc;
            --text-color: #e3e6eb;
            --error-color: #ff4a4a;
            --success-color: #2ec4b6;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top right, rgba(0, 136, 204, 0.15), transparent 400px);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 14px;
            color: #8f9cae;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #b0b9c6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.25);
        }

        button {
            width: 100%;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status.error {
            color: var(--error-color);
        }

        .status.success {
            color: var(--success-color);
        }

        /* Emoji captcha grid */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 12px 0;
        }

        .emoji-btn {
            width: 100%;
            aspect-ratio: 1;
            font-size: 36px;
            background: rgba(255,255,255,0.04);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .emoji-btn:hover {
            background: rgba(0,136,204,0.15);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .emoji-btn.selected {
            background: rgba(0,136,204,0.25);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,136,204,0.3);
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Перевірка</h1>
        <p>Дайте відповідь на запитання нижче, щоб підтвердити, що ви не бот або твінк.</p>
        
        <form id="captcha-form">
            <div id="questions-container"></div>
            <button type="submit">Надіслати відповіді</button>
        </form>

        <div id="status" class="status"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
