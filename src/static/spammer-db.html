<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicGuard - База спамерів</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: rgba(20, 24, 33, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #0088cc;
            --text-color: #e3e6eb;
            --success-color: #2ec4b6;
            --danger-color: #ff4a4a;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top left, rgba(0, 136, 204, 0.1), transparent 400px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #8f9cae;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        button.danger {
            background: var(--danger-color);
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: #b0b9c6;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-danger {
            background: rgba(255, 74, 74, 0.2);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .badge-info {
            background: rgba(0, 136, 204, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8f9cae;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8f9cae;
        }

        .error {
            background: rgba(255, 74, 74, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: rgba(46, 196, 182, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; align-items:center; gap:14px; margin-bottom:20px;">
            <a id="back-btn" href="/static/admin.html" style="display:inline-flex; align-items:center; gap:6px; color:#0ea5e9; text-decoration:none; font-size:14px; font-weight:500; padding:7px 14px; border:1px solid rgba(14,165,233,0.35); border-radius:8px; background:rgba(14,165,233,0.07); transition:background 0.2s;" onmouseover="this.style.background='rgba(14,165,233,0.15)'" onmouseout="this.style.background='rgba(14,165,233,0.07)'">
                ← Назад
            </a>
            <h1 style="margin:0;">🌍 Глобальна база спамерів</h1>
        </div>

        <div id="error-message" class="error" style="display: none;"></div>
        <div id="success-message" class="success" style="display: none;"></div>


        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-confirmed">0</div>
                <div class="stat-label">Підтверджених спамерів</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-reports">0</div>
                <div class="stat-label">Всього звітів</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-chats">0</div>
                <div class="stat-label">Унікальних чатів</div>
            </div>
        </div>

        <div class="actions">
            <button onclick="openAddModal()">+ Додати спамера</button>
            <button class="secondary" onclick="exportData()">📥 Експорт JSON</button>
            <button class="secondary" onclick="document.getElementById('import-file').click()">📤 Імпорт JSON</button>
            <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
            <button class="secondary" onclick="syncCAS()">🔄 Синхронізувати з CAS</button>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 Пошук за User ID..." oninput="renderTable()">
        </div>

        <div id="loading" class="loading">Завантаження...</div>
        <div id="table-container" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Причина</th>
                        <th>Звітів</th>
                        <th>Чатів</th>
                        <th>Дата</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="spammer-table"></tbody>
            </table>
        </div>
        <div id="empty-state" class="empty-state" style="display: none;">
            Немає підтверджених спамерів
        </div>
    </div>

    <!-- Add Spammer Modal -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Додати спамера</div>
            <div class="form-group">
                <label>User ID</label>
                <input type="number" id="add-user-id" placeholder="123456789">
            </div>
            <div class="form-group">
                <label>Причина</label>
                <textarea id="add-reason" placeholder="Наприклад: Спам в кількох чатах"></textarea>
            </div>
            <div class="modal-actions">
                <button class="secondary" onclick="closeModal('add-modal')">Скасувати</button>
                <button onclick="addSpammer()">Додати</button>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Деталі спамера</div>
            <div id="details-content"></div>
            <div class="modal-actions">
                <button class="secondary" onclick="closeModal('details-modal')">Закрити</button>
                <button class="danger" onclick="removeSelectedSpammer()">Видалити</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Back button — preserve chat_id if present
        (function() {
            const chatId = new URLSearchParams(window.location.search).get('chat_id');
            const backBtn = document.getElementById('back-btn');
            if (backBtn) {
                backBtn.href = chatId
                    ? `/static/admin.html?chat_id=${chatId}`
                    : '/static/admin.html';
            }
        })();

        let allSpammers = [];
        let allReports = [];
        let selectedUserId = null;

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openAddModal() {
            document.getElementById('add-user-id').value = '';
            document.getElementById('add-reason').value = '';
            openModal('add-modal');
        }

        async function loadData() {
            try {
                const [spammersRes, reportsRes] = await Promise.all([
                    fetch('/api/spammer/list'),
                    fetch('/api/spammer/reports')
                ]);

                if (!spammersRes.ok || !reportsRes.ok) {
                    throw new Error('Помилка завантаження даних');
                }

                const spammersData = await spammersRes.json();
                const reportsData = await reportsRes.json();

                allSpammers = spammersData.spammers || [];
                allReports = reportsData.reports || [];

                updateStats();
                renderTable();
            } catch (err) {
                showError(err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateStats() {
            document.getElementById('total-confirmed').textContent = allSpammers.length;
            document.getElementById('total-reports').textContent = allReports.length;
            
            const uniqueChats = new Set(allReports.map(r => r.chat_id));
            document.getElementById('total-chats').textContent = uniqueChats.size;
        }

        function renderTable() {
            const search = document.getElementById('search-input').value.trim();
            const tbody = document.getElementById('spammer-table');
            const container = document.getElementById('table-container');
            const empty = document.getElementById('empty-state');

            let filtered = allSpammers;
            if (search) {
                filtered = allSpammers.filter(s => 
                    s.user_id.toString().includes(search)
                );
            }

            if (filtered.length === 0) {
                container.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            container.style.display = 'block';
            empty.style.display = 'none';

            tbody.innerHTML = filtered.map(s => {
                const reports = allReports.filter(r => r.user_id === s.user_id);
                const chats = new Set(reports.map(r => r.chat_id)).size;
                
                return `
                    <tr>
                        <td><code>${s.user_id}</code></td>
                        <td>${s.reason || 'N/A'}</td>
                        <td>${reports.length}</td>
                        <td>${chats}</td>
                        <td>${new Date(s.confirmed_at).toLocaleDateString('uk-UA')}</td>
                        <td>
                            <button class="secondary" onclick="showDetails(${s.user_id})">Деталі</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function showDetails(userId) {
            selectedUserId = userId;
            const spammer = allSpammers.find(s => s.user_id === userId);
            const reports = allReports.filter(r => r.user_id === userId);

            const content = document.getElementById('details-content');
            content.innerHTML = `
                <div class="form-group">
                    <label>User ID:</label>
                    <div><code>${spammer.user_id}</code></div>
                </div>
                <div class="form-group">
                    <label>Причина:</label>
                    <div>${spammer.reason || 'N/A'}</div>
                </div>
                <div class="form-group">
                    <label>Дата додавання:</label>
                    <div>${new Date(spammer.confirmed_at).toLocaleString('uk-UA')}</div>
                </div>
                <div class="form-group">
                    <label>Звіти (${reports.length}):</label>
                    <div style="max-height: 200px; overflow-y: auto; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 6px;">
                        ${reports.map(r => `
                            <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">
                                <div>Чат: <code>${r.chat_id}</code></div>
                                <div style="font-size: 12px; color: #8f9cae;">Банів: ${r.banned_by} | ${new Date(r.timestamp).toLocaleString('uk-UA')}</div>
                                ${r.reason ? `<div style="font-size: 12px;">Причина: ${r.reason}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            openModal('details-modal');
        }

        async function addSpammer() {
            const userId = parseInt(document.getElementById('add-user-id').value);
            const reason = document.getElementById('add-reason').value.trim();

            if (!userId) {
                showError('Вкажіть User ID');
                return;
            }

            try {
                const res = await fetch('/api/spammer/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, reason })
                });

                if (!res.ok) {
                    throw new Error('Помилка додавання');
                }

                showSuccess('Спамер додано до бази');
                closeModal('add-modal');
                loadData();
            } catch (err) {
                showError(err.message);
            }
        }

        async function removeSelectedSpammer() {
            if (!selectedUserId) return;

            if (!confirm(`Видалити спамера ${selectedUserId} з бази?`)) return;

            try {
                const res = await fetch(`/api/spammer/remove?user_id=${selectedUserId}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    throw new Error('Помилка видалення');
                }

                showSuccess('Спамер видалено з бази');
                closeModal('details-modal');
                loadData();
            } catch (err) {
                showError(err.message);
            }
        }

        async function exportData() {
            try {
                const res = await fetch('/api/spammer/export');
                if (!res.ok) throw new Error('Помилка експорту');

                const data = await res.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `spammer-db-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);

                showSuccess('База експортована');
            } catch (err) {
                showError(err.message);
            }
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!data.spammers || !Array.isArray(data.spammers)) {
                    throw new Error('Невірний формат файлу');
                }

                const res = await fetch('/api/spammer/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    throw new Error('Помилка імпорту');
                }

                showSuccess(`Імпортовано ${data.spammers.length} спамерів`);
                loadData();
            } catch (err) {
                showError(err.message);
            } finally {
                event.target.value = '';
            }
        }

        async function syncCAS() {
            try {
                showSuccess('Синхронізація з CAS запущена...');
                const res = await fetch('/api/spammer/sync-cas', {
                    method: 'POST'
                });

                if (!res.ok) {
                    throw new Error('Помилка синхронізації');
                }

                const data = await res.json();
                showSuccess(`Синхронізовано: +${data.added || 0} нових спамерів`);
                loadData();
            } catch (err) {
                showError(err.message);
            }
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
