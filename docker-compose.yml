version: '3.8'

services:
  classicguard:
    build: .
    container_name: classicguard-bot
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./userbot_session:/app/userbot_session

  # One-time command to authenticate userbot (run once, then remove)
  auth-userbot:
    build: .
    container_name: classicguard-auth
    env_file:
      - .env
    volumes:
      - ./userbot_session:/app/userbot_session
    command: python auth_userbot.py
    restart: "no"
